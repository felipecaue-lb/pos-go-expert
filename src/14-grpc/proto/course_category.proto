// Comando para gerar os arquivos do protobuf: protoc --go_out=. --go-grpc_out=. proto/course_category.proto

syntax = "proto3";
package pb;
option go_package = "internal/pb";

message blank {}

message Category {
  string id          = 1;
  string name        = 2;
  string description = 3;
}

message CreateCategoryRequest {
  string name        = 1;
  string description = 2;
}

message ListCategory {
  repeated Category categories = 1;
}

message CategoryGetRequest {
  string id = 1;
}

service CategoryService {
  rpc CreateCategory(CreateCategoryRequest) returns (Category) {}
  rpc CreateCategoryStream(stream CreateCategoryRequest) returns (ListCategory) {}
  rpc CreateCategoryStreamBidirectional(stream CreateCategoryRequest) returns (stream Category) {}
  rpc ListCategories(blank) returns (ListCategory) {}
  rpc GetCategory(CategoryGetRequest) returns (Category) {}
}